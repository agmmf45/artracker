<script>
if('serviceWorker' in navigator){
  // امسح أي كاش قديم ثم سجّل sw.js (network-only) — يضمن دائماً أحدث نسخة
  try{ caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))); }catch(e){}
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// ── PWA ──────────────────────────────────────
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _deferredPrompt = e;
  const b = document.getElementById('pwa-banner');
  if(b) b.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  const b = document.getElementById('pwa-banner');
  if(b) b.style.display = 'none';
  try{showToast('✅ تم تثبيت التطبيق!');}catch(e){}
});
function installPWA(){
  const b = document.getElementById('pwa-banner');
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(r=>{
      _deferredPrompt = null;
      if(b) b.style.display = 'none';
    });
  } else {
    try{showToast('iOS: اضغط زر المشاركة ثم "إضافة للشاشة الرئيسية" 📲');}catch(e){}
    if(b) b.style.display = 'none';
  }
}
// iOS - show after 3s if not installed
setTimeout(() => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone = window.matchMedia('(display-mode:standalone)').matches || navigator.standalone;
  const b = document.getElementById('pwa-banner');
  if(isIOS && !standalone && b && !_deferredPrompt) b.style.display = 'flex';
}, 3000);

</script>

<style>

.btn-auth::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);

.btn-auth:hover::before{transform:translateX(100%);}

.auth-ok{color:#86EFAC;font-size:13px;margin-top:12px;display:none;text-align:center;background:rgba(21,128,61,0.15);padding:10px 14px;border-radius:12px;border:1px solid rgba(21,128,61,0.3);}

@media(max-width:680px){
  .sidebar{display:none;}

</style>

<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px">جاري التحميل...</div>
</div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-title">دقيق</div>
      <div class="auth-sub">تطبيقك الشامل للعادات والتمارين والتغذية</div>
    </div>
    
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab(0)">دخول</div>
      <div class="auth-tab" onclick="switchAuthTab(1)">جديد</div>
    </div>

    <div id="auth-login-tab">
      <div class="auth-input-wrap">
        <span class="auth-input-icon">👤</span>
        <input type="email" class="auth-fi" id="login-email" placeholder="بريدك الإلكتروني">
      </div>
      <div class="auth-input-wrap">
        <span class="auth-input-icon">🔐</span>
        <input type="password" class="auth-fi" id="login-password" placeholder="كلمة المرور">
      </div>
      <button class="btn-auth" onclick="doLogin()">دخول</button>
      <div class="auth-err" id="auth-err"></div>
      <div class="auth-ok" id="auth-ok"></div>
    </div>

    <div id="auth-signup-tab" style="display:none">
      <div class="auth-input-wrap">
        <span class="auth-input-icon">👤</span>
        <input type="text" class="auth-fi" id="signup-name" placeholder="اسمك">
      </div>
      <div class="auth-input-wrap">
        <span class="auth-input-icon">📧</span>
        <input type="email" class="auth-fi" id="signup-email" placeholder="بريدك الإلكتروني">
      </div>
      <div class="auth-input-wrap">
        <span class="auth-input-icon">🔐</span>
        <input type="password" class="auth-fi" id="signup-password" placeholder="كلمة المرور">
      </div>
      <button class="btn-auth" onclick="doSignup()">إنشاء حساب</button>
      <div class="auth-err" id="auth-err-2"></div>
      <div class="auth-ok" id="auth-ok-2"></div>
    </div>
  </div>
</div>

<!-- APP (placeholder) -->
<div id="app" style="display:none;padding:20px;text-align:center;">
  <h1>تطبيق دقيق</h1>
  <p>سيتم تطوير واجهة التطبيق قريباً...</p>
</div>

<input type="file" id="calorie-file-input" accept="image/*" style="display:none">

<script>
// ════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════
const API_BASE = '/api';
let currentUser = null;
let currentToken = null;

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  
  if(!email || !password){
    showAuthError('من فضلك ادخل البريد وكلمة المرور', 'login');
    return;
  }

  try{
    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    
    if(!res.ok){
      showAuthError(data.error || 'خطأ في الدخول', 'login');
      return;
    }

    currentUser = data.user;
    currentToken = data.token;
    localStorage.setItem('token', currentToken);
    localStorage.setItem('user', JSON.stringify(currentUser));
    
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(e){
    showAuthError('خطأ في الاتصال: ' + e.message, 'login');
  }
}

async function doSignup(){
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  
  if(!name || !email || !password){
    showAuthError('من فضلك ملء جميع الحقول', 'signup');
    return;
  }

  try{
    const res = await fetch(`${API_BASE}/signup`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const data = await res.json();
    
    if(!res.ok){
      showAuthError(data.error || 'خطأ في الإنشاء', 'signup');
      return;
    }

    currentUser = data.user;
    currentToken = data.token;
    localStorage.setItem('token', currentToken);
    localStorage.setItem('user', JSON.stringify(currentUser));
    
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(e){
    showAuthError('خطأ في الاتصال: ' + e.message, 'signup');
  }
}

function doLogout(){
  currentToken = null;
  currentUser = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

function showAuthError(msg, tab){
  const errEl = document.getElementById(`auth-err${tab === 'signup' ? '-2' : ''}`);
  errEl.textContent = msg;
  errEl.style.display = 'block';
  setTimeout(() => { errEl.style.display = 'none'; }, 4000);
}

function switchAuthTab(i){
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('[id^="auth-"]').forEach(e => {
    if(e.id.startsWith('auth-') && e.id.includes('tab')) e.style.display = 'none';
  });
  document.querySelectorAll('.auth-tab')[i].classList.add('active');
  document.getElementById(i === 0 ? 'auth-login-tab' : 'auth-signup-tab').style.display = 'block';
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
function init(){
  document.getElementById('loading-screen').style.display = 'none';
  
  const saved = localStorage.getItem('token');
  if(saved){
    currentToken = saved;
    currentUser = JSON.parse(localStorage.getItem('user'));
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

init();
</script>
</body>
